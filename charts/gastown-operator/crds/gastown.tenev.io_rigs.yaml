---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.3
  name: rigs.gastown.tenev.io
spec:
  group: gastown.tenev.io
  names:
    kind: Rig
    listKind: RigList
    plural: rigs
    shortNames:
    - rig
    singular: rig
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: 'Rig represents a single Gas Town rig: one git repository and
          its agent pool.'
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: RigSpec defines the desired state of a Rig.
            properties:
              agents:
                description: Agents configures the agent roles active for this rig.
                properties:
                  deacon:
                    default: true
                    description: Deacon enables the Deacon agent for this rig.
                    type: boolean
                  maxPolecats:
                    description: MaxPolecats overrides GasTown.spec.defaults.maxPolecats
                      for this rig.
                    format: int32
                    maximum: 100
                    minimum: 1
                    type: integer
                  mayor:
                    default: true
                    description: Mayor enables the Mayor agent for this rig.
                    type: boolean
                  mayorClaudeMdRef:
                    description: MayorClaudeMdRef names a ConfigMap containing the
                      Mayor's CLAUDE.md for this rig.
                    properties:
                      name:
                        minLength: 1
                        type: string
                    required:
                    - name
                    type: object
                  mayorModel:
                    description: MayorModel overrides GasTown.spec.defaults.mayorModel
                      for this rig.
                    type: string
                  polecatModel:
                    description: PolecatModel overrides GasTown.spec.defaults.polecatModel
                      for this rig.
                    type: string
                  refinery:
                    default: true
                    description: Refinery enables the Refinery agent for this rig.
                    type: boolean
                  witness:
                    default: true
                    description: Witness enables the Witness agent for this rig.
                    type: boolean
                type: object
              branch:
                default: main
                description: Branch is the git branch this rig tracks.
                type: string
              enabled:
                default: true
                description: |-
                  Enabled controls whether this rig is active. Disabled rigs are drained
                  and stopped by the Surveyor.
                type: boolean
              formulas:
                description: Formulas lists cron-driven Formula schedules active for
                  this rig.
                items:
                  description: RigFormula declares a cron-driven Formula workflow
                    for a rig.
                  properties:
                    name:
                      minLength: 1
                      type: string
                    schedule:
                      description: Schedule is a standard 5-field cron expression.
                      pattern: ^(@(annually|yearly|monthly|weekly|daily|hourly|reboot))|(((\d+,)+\d+|(\d+(\/|-)\d+)|\d+|\*)
                        ){4}((\d+,)+\d+|(\d+(\/|-)\d+)|\d+|\*)$
                      type: string
                  required:
                  - name
                  - schedule
                  type: object
                type: array
              repo:
                description: Repo is the filesystem path to the git repository for
                  this rig.
                minLength: 1
                type: string
              roles:
                description: |-
                  Roles lists AgentRole names (in this namespace) opted into by this rig.
                  Only AgentRole objects with scope=rig require opt-in here.
                items:
                  type: string
                type: array
              townRef:
                description: TownRef names the GasTown CR this Rig belongs to.
                minLength: 1
                type: string
            required:
            - branch
            - enabled
            - repo
            - townRef
            type: object
          status:
            description: RigStatus describes the observed state of a Rig.
            properties:
              conditions:
                description: Conditions reflect the current state of the Rig (Ready,
                  DesiredTopologyInSync).
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              doltCommit:
                description: DoltCommit is the Dolt commit hash of the last successful
                  desired_topology write.
                type: string
              lastConvergedAt:
                description: LastConvergedAt is when the rig last reached a fully
                  converged state.
                format: date-time
                type: string
              observedGeneration:
                description: ObservedGeneration is the .metadata.generation this status
                  reflects.
                format: int64
                type: integer
              rigHealth:
                description: 'RigHealth is the health summary from actual_topology:
                  healthy, degraded, or unknown.'
                type: string
              runningPolecats:
                description: |-
                  RunningPolecats is the current number of running Polecat agents
                  (read from actual_topology).
                format: int32
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
