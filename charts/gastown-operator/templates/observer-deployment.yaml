{{- if .Values.observer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gastown-operator.fullname" . }}-observer
  labels:
    {{- include "gastown-operator.labels" . | nindent 4 }}
    app: dgt-observer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dgt-observer
  template:
    metadata:
      labels:
        app: dgt-observer
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "gastown-operator.fullname" . }}-observer
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: observer
        image: "{{ .Values.observer.image.repository }}:{{ .Values.observer.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        args:
        - dgt-observer
        ports:
        - name: metrics
          containerPort: 9091
          protocol: TCP
        env:
        - name: DGT_DOLT_DSN
          valueFrom:
            secretKeyRef:
              name: dolt-credentials
              key: dsn
        readinessProbe:
          httpGet:
            path: /healthz
            port: 9091
          initialDelaySeconds: 5
          periodSeconds: 10
        {{- with .Values.securityContext }}
        securityContext:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 128Mi
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
