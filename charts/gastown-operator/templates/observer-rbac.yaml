{{- if .Values.observer.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "gastown-operator.fullname" . }}-observer
  labels:
    {{- include "gastown-operator.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
# dgt-observer reads only from Dolt (external MySQL); no K8s API access is needed.
# The ClusterRole is intentionally empty — created only to satisfy ServiceAccount binding
# requirements in restricted PSP/PSA environments.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "gastown-operator.fullname" . }}-observer
  labels:
    {{- include "gastown-operator.labels" . | nindent 4 }}
rules: []
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "gastown-operator.fullname" . }}-observer
  labels:
    {{- include "gastown-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "gastown-operator.fullname" . }}-observer
subjects:
- kind: ServiceAccount
  name: {{ include "gastown-operator.fullname" . }}-observer
  namespace: {{ .Release.Namespace }}
{{- end }}
