apiVersion: v1
kind: Service
metadata:
  name: {{ include "gastown-operator.fullname" . }}-webhook
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gastown-operator.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "gastown-operator.selectorLabels" . | nindent 4 }}
  ports:
    - name: webhook
      port: 443
      targetPort: webhook
      protocol: TCP
