apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gastown-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gastown-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "gastown-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gastown-operator.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "gastown-operator.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: operator
          image: {{ include "gastown-operator.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: webhook
              containerPort: {{ .Values.webhook.port }}
              protocol: TCP
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: healthz
              containerPort: 8081
              protocol: TCP
          args:
            - --status-sync-interval={{ .Values.statusSyncInterval }}
            - --webhook-port={{ .Values.webhook.port }}
            {{- if not .Values.webhook.certManager }}
            - --webhook-tls-cert-file={{ .Values.webhook.certFile }}
            - --webhook-tls-key-file={{ .Values.webhook.keyFile }}
            {{- end }}
          env:
            - name: OPERATOR_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          livenessProbe:
            httpGet:
              path: /healthz
              port: healthz
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: healthz
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: webhook-certs
              mountPath: /tmp/k8s-webhook-server/serving-certs
              readOnly: true
            - name: operator-config
              mountPath: /etc/gastown/ddl
              readOnly: true
      volumes:
        - name: webhook-certs
          secret:
            secretName: {{ include "gastown-operator.fullname" . }}-webhook-cert
        - name: operator-config
          configMap:
            name: {{ include "gastown-operator.fullname" . }}-ddl
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
