---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.3
  name: agentroles.gastown.tenev.io
spec:
  group: gastown.tenev.io
  names:
    kind: AgentRole
    listKind: AgentRoleList
    plural: agentroles
    shortNames:
    - ar
    singular: agentrole
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          AgentRole declares a custom agent archetype that can be activated per rig
          (scope=rig) or town-wide (scope=town).
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AgentRoleSpec defines the desired state of an AgentRole.
            properties:
              identity:
                description: Identity declares the agent's CLAUDE.md file location.
                properties:
                  claudeMdRef:
                    description: |-
                      ClaudeMdRef names a ConfigMap containing the CLAUDE.md for this role.
                      Inline content is not supported (ADR-0004, Decision 2).
                    properties:
                      name:
                        minLength: 1
                        type: string
                    required:
                    - name
                    type: object
                required:
                - claudeMdRef
                type: object
              resources:
                description: Resources constrains instance count for this role.
                properties:
                  maxInstances:
                    default: 1
                    description: MaxInstances sets the capacity ceiling for concurrent
                      instances.
                    format: int32
                    minimum: 1
                    type: integer
                type: object
              scope:
                description: Scope determines whether this role is activated per-rig
                  or town-wide.
                enum:
                - rig
                - town
                type: string
              supervision:
                description: |-
                  Supervision declares this role's position in the agent hierarchy.
                  Parent is required — no role may exist without a supervisor.
                properties:
                  parent:
                    description: |-
                      Parent is the built-in or custom role that supervises this role.
                      Must be non-empty. Webhook enforces that it does not equal this role's name.
                    minLength: 1
                    type: string
                  reportsTo:
                    description: ReportsTo is the escalation target. Defaults to Parent
                      if empty.
                    type: string
                required:
                - parent
                type: object
              townRef:
                description: TownRef names the GasTown CR this role belongs to.
                minLength: 1
                type: string
              trigger:
                description: Trigger defines how the role is activated.
                properties:
                  event:
                    description: Event is the event name polled via bd search. Required
                      when Type=event.
                    type: string
                  schedule:
                    description: Schedule is a cron expression. Required when Type=schedule.
                    type: string
                  type:
                    description: Type determines the activation mechanism.
                    enum:
                    - bead_assigned
                    - schedule
                    - event
                    - manual
                    type: string
                required:
                - type
                type: object
                x-kubernetes-validations:
                - message: schedule is required when type=schedule
                  rule: "self.type != 'schedule' || (has(self.schedule) && self.schedule
                    != '')"
                - message: event is required when type=event
                  rule: "self.type != 'event' || (has(self.event) && self.event !=
                    '')"
            required:
            - identity
            - scope
            - supervision
            - townRef
            - trigger
            type: object
          status:
            description: AgentRoleStatus describes the observed state of an AgentRole.
            properties:
              activeInstances:
                description: |-
                  ActiveInstances is the current number of running instances of this role
                  (read from actual_topology).
                format: int32
                type: integer
              conditions:
                description: Conditions reflect the current state of the AgentRole
                  (Ready, DesiredTopologyInSync).
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              doltCommit:
                description: DoltCommit is the Dolt commit hash of the last successful
                  desired_custom_roles write.
                type: string
              lastSeenAt:
                description: LastSeenAt is when an instance of this role was last
                  observed active.
                format: date-time
                type: string
              observedGeneration:
                description: ObservedGeneration is the .metadata.generation this status
                  reflects.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
