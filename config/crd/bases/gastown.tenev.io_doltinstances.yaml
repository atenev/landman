  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          DoltInstance manages a single Dolt SQL server backing a Gas Town instance.
          The operator reconciles a StatefulSet, a headless Service, and a PVC.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: DoltInstanceSpec defines the desired state of a DoltInstance.
            properties:
              replicas:
                default: 1
                description: Replicas must be 1 in MVP. Field is present for API stability
                  only.
                format: int32
                maximum: 1
                minimum: 1
                type: integer
              service:
                description: Service configures the Kubernetes Service for Dolt.
                properties:
                  port:
                    default: 3306
                    description: Port is the port on which the Service exposes Dolt's
                      MySQL-compatible endpoint.
                    format: int32
                    type: integer
                  type:
                    default: ClusterIP
                    description: Type is the Kubernetes Service type.
                    enum:
                    - ClusterIP
                    - NodePort
                    - LoadBalancer
                    type: string
                type: object
              storage:
                description: Storage configures the PersistentVolumeClaim for Dolt
                  data.
                properties:
                  size:
                    anyOf:
                    - type: integer
                    - type: string
                    description: |-
                      Size is the requested PVC capacity (e.g. "10Gi").
                      resource.Quantity has its own OpenAPI schema type; no extra Pattern needed.
                    pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                    x-kubernetes-int-or-string: true
                  storageClassName:
                    description: StorageClassName names the StorageClass to use for
                      the PVC.
                    type: string
                required:
                - size
                type: object
              version:
                description: Version is the Dolt container image tag to use.
                minLength: 1
                type: string
            required:
            - replicas
            - storage
            - version
            type: object
          status:
            description: DoltInstanceStatus describes the observed state of a DoltInstance.
            properties:
              conditions:
                description: |-
                  Conditions reflect the current state of the DoltInstance
                  (Ready, DDLInitialized, VersionMigrationRequired).
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
