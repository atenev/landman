---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.3
  name: gastowns.gastown.tenev.io
spec:
  group: gastown.tenev.io
  names:
    kind: GasTown
    listKind: GasTownList
    plural: gastowns
    shortNames:
    - gt
    singular: gastown
  scope: Cluster
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          GasTown is the top-level cluster-scoped resource representing a Gas Town
          instance. One GasTown CR per deployment environment (dev / staging / prod).
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: GasTownSpec defines the desired state of a Gas Town instance.
            properties:
              agents:
                description: Agents configures town-level agent process lifecycle.
                properties:
                  surveyor:
                    default: false
                    description: Surveyor controls whether the operator manages a
                      Surveyor Deployment.
                    type: boolean
                  surveyorClaudeMdRef:
                    description: |-
                      SurveyorClaudeMdRef names a ConfigMap containing the Surveyor CLAUDE.md.
                      Required when Surveyor=true.
                    properties:
                      name:
                        minLength: 1
                        type: string
                    required:
                    - name
                    type: object
                  surveyorImage:
                    description: SurveyorImage overrides the default Surveyor container
                      image.
                    type: string
                  surveyorResources:
                    description: SurveyorResources sets resource requests/limits for
                      the Surveyor pod.
                    properties:
                      claims:
                        description: |-
                          Claims lists the names of resources, defined in spec.resourceClaims,
                          that are used by this container.

                          This is an alpha field and requires enabling the
                          DynamicResourceAllocation feature gate.

                          This field is immutable. It can only be set for containers.
                        items:
                          description: ResourceClaim references one entry in PodSpec.ResourceClaims.
                          properties:
                            name:
                              description: |-
                                Name must match the name of one entry in pod.spec.resourceClaims of
                                the Pod where this field is used. It makes that resource available
                                inside a container.
                              type: string
                            request:
                              description: |-
                                Request is the name chosen for a request in the referenced claim.
                                If empty, everything from the claim is made available, otherwise
                                only the result of this request.
                              type: string
                          required:
                          - name
                          type: object
                        type: array
                        x-kubernetes-list-map-keys:
                        - name
                        x-kubernetes-list-type: map
                      limits:
                        additionalProperties:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        description: |-
                          Limits describes the maximum amount of compute resources allowed.
                          More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                        type: object
                      requests:
                        additionalProperties:
                          anyOf:
                          - type: integer
                          - type: string
                          pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                          x-kubernetes-int-or-string: true
                        description: |-
                          Requests describes the minimum amount of compute resources required.
                          If Requests is omitted for a container, it defaults to Limits if that is explicitly specified,
                          otherwise to an implementation-defined value. Requests cannot exceed Limits.
                          More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                        type: object
                    type: object
                type: object
              defaults:
                description: |-
                  Defaults provides town-wide agent configuration defaults.
                  Individual Rig CRs may override these per-field.
                properties:
                  maxPolecats:
                    default: 20
                    description: MaxPolecats is the default maximum concurrent Polecat
                      agents per rig.
                    format: int32
                    maximum: 100
                    minimum: 1
                    type: integer
                  mayorModel:
                    default: claude-opus-4-6
                    description: MayorModel is the default Claude model for Mayor
                      agents.
                    type: string
                  polecatModel:
                    default: claude-sonnet-4-6
                    description: PolecatModel is the default Claude model for Polecat
                      agents.
                    type: string
                type: object
              doltRef:
                description: DoltRef references the DoltInstance backing this town.
                properties:
                  name:
                    minLength: 1
                    type: string
                  namespace:
                    minLength: 1
                    type: string
                required:
                - name
                - namespace
                type: object
              home:
                description: Home is the base directory for Gas Town data on agent
                  hosts.
                minLength: 1
                type: string
              secretsRef:
                description: |-
                  SecretsRef names a Kubernetes Secret containing API keys and tokens.
                  Values are injected as env vars into agent pods — never written to Dolt.
                properties:
                  name:
                    minLength: 1
                    type: string
                required:
                - name
                type: object
              version:
                description: |-
                  Version is the town.toml schema version this CR corresponds to.
                  Must match a version known to town-ctl and the operator.
                pattern: ^\d+$
                type: string
            required:
            - doltRef
            - home
            - version
            type: object
          status:
            description: GasTownStatus describes the observed state of a GasTown instance.
            properties:
              conditions:
                description: |-
                  Conditions reflect the current state of the GasTown (Ready,
                  SurveyorRunning, DesiredTopologyInSync).
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              doltCommit:
                description: DoltCommit is the Dolt commit hash of the last successful
                  desired_topology write.
                type: string
              lastReconcileAt:
                description: |-
                  LastReconcileAt is when the Surveyor last completed a reconcile loop
                  (read from actual_topology).
                format: date-time
                type: string
              observedGeneration:
                description: ObservedGeneration is the .metadata.generation this status
                  reflects.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
