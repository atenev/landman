apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gastown-operator-rolebinding
  namespace: system
  labels:
    app.kubernetes.io/name: gastown-operator
    app.kubernetes.io/component: controller-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gastown-operator-role
subjects:
  - kind: ServiceAccount
    name: gastown-operator
    namespace: system
